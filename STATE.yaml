features:
  F-038-kernel-type-migration:
    status: ready
    spec: ./specs/features/F-038-kernel-type-migration.md
    priority: critical
    estimated_effort: medium
    description: |
      CRITICAL: Provider cannot be loaded by Amplifier without this migration.
      
      Problem: Workspace uses local dataclasses for ProviderInfo, ModelInfo, ToolCall, 
      and LLMError hierarchy. Kernel expects Pydantic models from amplifier_core.
      isinstance() checks fail when kernel validates provider.
      
      Solution: Import kernel types, update boundary methods to return kernel types,
      keep internal streaming machinery unchanged.
      
      Expert panel reviewed: Zen Architect, Bug Hunter, Integration Specialist.
      All blockers addressed in spec.
    acceptance_criteria:
      - AC-1: get_info() returns amplifier_core.ProviderInfo
      - AC-2: translate_sdk_error() returns kernel error types
      - AC-3: parse_tool_calls() is method returning amplifier_core.ToolCall
      - AC-4: complete() returns ChatResponse (not iterator)
      - AC-5: ChatResponse.content uses TextBlock/ThinkingBlock (Pydantic)
      - AC-6: All existing tests pass
      - AC-7: Build passes (ruff check + pyright)
      - AC-8: YAML error translation preserved
