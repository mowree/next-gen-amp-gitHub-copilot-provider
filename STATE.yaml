  kernel_migration_discovery: |
    On 2026-03-13 at ~17:00 UTC, investigation revealed the provider uses local
    dataclasses instead of amplifier_core kernel types. This was never caught
    because tests use MagicMock() coordinators that don't validate types.
    
    Expert panel (5 agents) confirmed the root cause and reviewed the migration spec.
    F-038 addresses this with a boundary-only migration that preserves internal
    streaming architecture while returning kernel types from public methods.
