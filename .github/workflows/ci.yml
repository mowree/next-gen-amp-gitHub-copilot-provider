name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fast-feedback:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      
      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"
      
      - name: Lint (ruff)
        run: uv run ruff check amplifier_module_provider_github_copilot/ tests/
      
      - name: Format check (ruff)
        run: uv run ruff format --check amplifier_module_provider_github_copilot/ tests/
      
      - name: Type check (pyright)
        run: uv run pyright amplifier_module_provider_github_copilot/
      
      - name: YAML schema validation
        run: |
          python -c "
          import yaml
          from pathlib import Path
          for f in Path('config').glob('*.yaml'):
              yaml.safe_load(f.read_text())
              print(f'✓ {f}')
          "
      
      - name: Unit tests
        run: uv run pytest tests/ -v --timeout=90 -x
