# =============================================================================
# provider-github-copilot-build: The Development Machine Outer Loop
# =============================================================================
#
# This is the meta-recipe -- the "machine" itself. It reads project state,
# dispatches fresh working sessions, and loops until the project is complete
# or a blocker is hit.
#
# Each working session starts with zero context, reads STATE.yaml and
# CONTEXT-TRANSFER.md, does a bounded batch of work (3 features),
# persists all state back to files, and exits.
#
# Usage:
#   amplifier recipe execute .dev-machine/build.yaml
#
# =============================================================================

name: "provider-github-copilot-build"
description: "Outer orchestration loop for the provider-github-copilot development machine. Reads state, dispatches working sessions, persists progress across context windows."
version: "1.0.0"
author: "provider-github-copilot Development Machine"
tags: ["orchestration", "meta-recipe", "development-machine", "provider-github-copilot"]

context:
  state_file: "./STATE.yaml"
  context_file: "./CONTEXT-TRANSFER.md"
  specs_dir: "./specs"
  status: "healthy"
  session_count: "0"
  heal_status:
    status: "healthy"
    message: ""

steps:
  # ---------------------------------------------------------------------------
  # Step 0: Container safety check -- refuse to run on bare host
  # ---------------------------------------------------------------------------
  - id: "container-check"
    type: "bash"
    timeout: 30
    command: |
      # Check if running inside a container
      if [ ! -f /.dockerenv ] && [ ! -f /run/.containerenv ]; then
          echo "=========================================="
          echo "ERROR: DEV MACHINE NOT RUNNING IN CONTAINER"
          echo "=========================================="
          echo ""
          echo "Running dev-machine recipes outside a container is DANGEROUS."
          echo "Autonomous agents have unrestricted filesystem access and can"
          echo "damage files outside the project directory."
          echo ""
          echo "Use: ./run-dev-machine.sh"
          echo "Or:  docker compose run --rm dev-machine"
          echo ""
          echo "To bypass this check (NOT RECOMMENDED):"
          echo "  export DEV_MACHINE_ALLOW_HOST=1"
          echo "=========================================="
          if [ -z "${DEV_MACHINE_ALLOW_HOST:-}" ]; then
              exit 1
          fi
          echo "WARNING: DEV_MACHINE_ALLOW_HOST is set. Proceeding on bare host."
          echo "YOU ACCEPT ALL RISKS OF FILESYSTEM DAMAGE."
      fi
      echo "Container check passed."
    on_error: "fail"

  # ---------------------------------------------------------------------------
  # Step 1: Read STATE.yaml and check for blockers
  # ---------------------------------------------------------------------------
  - id: "read-state"
    type: "bash"
    timeout: 60
    on_error: "fail"
    command: |
      python3 << 'PYEOF'
      import json, yaml
      try:
          with open("./STATE.yaml") as f:
              state = yaml.safe_load(f)
          blockers = state.get("blockers", [])
          result = {
              "phase": state.get("phase", 0),
              "phase_name": state.get("phase_name", "unknown"),
              "epoch": state.get("epoch", 0),
              "next_action": state.get("next_action", ""),
              "blocker_count": len(blockers),
              "blockers": blockers,
              "status": "blocked" if blockers else "healthy"
          }
          print(json.dumps(result))
      except Exception as e:
          print(json.dumps({
              "status": "blocked",
              "blockers": ["Failed to read STATE.yaml: " + str(e)],
              "blocker_count": 1
          }))
      PYEOF
    output: "initial_state"
    parse_json: true

  # ---------------------------------------------------------------------------
  # Step 2: If blockers exist, run health-check to auto-fix
  # ---------------------------------------------------------------------------
  - id: "auto-heal"
    type: "recipe"
    condition: "{{initial_state.status}} == 'blocked'"
    recipe: "./health-check.yaml"
    context:
      state_file: "./STATE.yaml"
      context_file: "./CONTEXT-TRANSFER.md"
    output: "heal_result"
    timeout: 1800
    on_error: "continue"

  # ---------------------------------------------------------------------------
  # Step 2b: Re-read state after heal attempt
  # ---------------------------------------------------------------------------
  - id: "recheck-state"
    type: "bash"
    timeout: 60
    condition: "{{initial_state.status}} == 'blocked'"
    command: |
      python3 << 'PYEOF'
      import json, yaml
      try:
          with open("./STATE.yaml") as f:
              state = yaml.safe_load(f)
          blockers = state.get("blockers", [])
          if blockers:
              print(json.dumps({"status": "blocked", "message": "Health check could not fix blockers"}))
          else:
              print(json.dumps({"status": "healthy", "message": "Blockers resolved by health check"}))
      except Exception as e:
          print(json.dumps({"status": "blocked", "message": str(e)}))
      PYEOF
    output: "heal_status"
    parse_json: true
    on_error: "continue"

  # ---------------------------------------------------------------------------
  # Step 2c: Only fail if heal didn't work
  # ---------------------------------------------------------------------------
  - id: "check-health"
    type: "bash"
    timeout: 30
    condition: "{{initial_state.status}} == 'blocked' and {{heal_status.status}} == 'blocked'"
    command: |
      echo "BLOCKED: Health check could not resolve blockers."
      echo "{{heal_status.message}}"
      echo ""
      echo "Manual intervention required. Check ./STATE.yaml"
      exit 1
    on_error: "fail"

  # ---------------------------------------------------------------------------
  # Step 3: Main work loop -- calls sub-recipe per iteration
  #
  # Each iteration: orient (read state) -> working session -> post-session check.
  # Loop exits when status becomes "blocked" or max iterations reached.
  # ---------------------------------------------------------------------------
  - id: "work-loop"
    type: "recipe"
    recipe: "./iteration.yaml"
    context:
      state_file: "./STATE.yaml"
      context_file: "./CONTEXT-TRANSFER.md"
      specs_dir: "./specs"
      session_count: "{{session_count}}"
    output: "iteration_result"
    parse_json: true
    timeout: 4200
    on_error: "continue"
    while_condition: "{{status}} == 'healthy'"
    max_while_iterations: 50
    break_when: "{{status}} != 'healthy'"
    update_context:
      status: "{{iteration_result.iteration_result.status}}"
      session_count: "{{iteration_result.iteration_result.session_count}}"

  # ---------------------------------------------------------------------------
  # Step 4: Completion Gate -- MUST pass before phase can be declared complete
  # Runs all checks without short-circuit, aggregates results
  # ---------------------------------------------------------------------------
  - id: "completion-gate"
    type: "bash"
    condition: "{{status}} == 'complete'"
    command: |
      cd /workspace 2>/dev/null || cd /home/mowrim/projects/next-get-provider-github-copilot
      echo ""
      echo "========================================"
      echo "  COMPLETION GATE: Full Verification"
      echo "========================================"
      echo ""
      
      # Run ALL checks - no short-circuit
      set +e
      RUFF_EXIT=0; PYRIGHT_EXIT=0; TEST_EXIT=0
      
      # Use system-installed tools (not uv run) - volume mount shadows build-time .venv
      echo "--- Lint Check (ruff) ---"
      ruff check amplifier_module_provider_github_copilot/ 2>&1
      RUFF_EXIT=$?
      echo "  Exit code: $RUFF_EXIT"
      echo ""
      
      echo "--- Type Check (pyright) ---"
      pyright amplifier_module_provider_github_copilot/ 2>&1
      PYRIGHT_EXIT=$?
      echo "  Exit code: $PYRIGHT_EXIT"
      echo ""
      
      echo "--- Test Suite (pytest) ---"
      pytest tests/ -v 2>&1
      TEST_EXIT=$?
      echo "  Exit code: $TEST_EXIT"
      echo ""
      
      # Aggregate results
      if [ "$RUFF_EXIT" -eq 0 ] && [ "$PYRIGHT_EXIT" -eq 0 ] && [ "$TEST_EXIT" -eq 0 ]; then
        echo "========================================"
        echo "  COMPLETION GATE: PASSED"
        echo "  Phase verified clean - all checks passed"
        echo "========================================"
        echo '{"gate": "passed", "ruff": 0, "pyright": 0, "pytest": 0}'
      else
        echo "========================================"
        echo "  COMPLETION GATE: FAILED"
        echo "  ruff=$RUFF_EXIT pyright=$PYRIGHT_EXIT pytest=$TEST_EXIT"
        echo "========================================"
        
        # Add blocker to STATE.yaml
        python3 -c "import yaml, datetime; f=open('./STATE.yaml'); s=yaml.safe_load(f); f.close(); b=s.get('blockers') or []; b.append({'description': 'Completion gate failed: ruff=$RUFF_EXIT pyright=$PYRIGHT_EXIT pytest=$TEST_EXIT', 'since': datetime.datetime.now().isoformat(), 'severity': 'high'}); s['blockers']=b; f=open('./STATE.yaml','w'); yaml.dump(s,f,default_flow_style=False,sort_keys=False); f.close()"
        echo '{"gate": "failed", "ruff": '$RUFF_EXIT', "pyright": '$PYRIGHT_EXIT', "pytest": '$TEST_EXIT'}'
        exit 1
      fi
    output: "gate_result"
    parse_json: true
    timeout: 600
    on_error: "fail"

  # ---------------------------------------------------------------------------
  # Step 5: Final summary
  # ---------------------------------------------------------------------------
  - id: "final-summary"
    type: "bash"
    command: |
      echo ""
      echo "========================================"
      echo "  provider-github-copilot Development Machine -- Run Complete"
      echo "========================================"
      echo ""
      echo "  Sessions completed: {{session_count}}"
      echo "  Final status:       {{status}}"
      echo ""
      if [ "{{status}}" = "blocked" ]; then
        echo "  Stopped: BLOCKERS detected"
        echo "  Check ./STATE.yaml for blocker details."
      elif [ "{{status}}" = "complete" ]; then
        echo "  PHASE COMPLETE - Verified by completion gate"
      else
        echo "  Stopped: work loop exit (max iterations or no more work)"
      fi
      echo ""
      echo "  State file:    ./STATE.yaml"
      echo "  Context file:  ./CONTEXT-TRANSFER.md"
      echo ""
      echo "========================================"
    output: "summary"
