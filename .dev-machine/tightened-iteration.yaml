  # ---------------------------------------------------------------------------
  # Quorum synthesis: aggregate votes, block on VETO, document approval
  # ---------------------------------------------------------------------------
  - id: "quorum-synthesis"
    type: "bash"
    command: |
      cd /workspace 2>/dev/null || cd /home/mowrim/projects/next-get-provider-github-copilot
      echo "=== EXPERT QUORUM SYNTHESIS ==="

      python3 << 'PYEOF'
      import json, yaml, datetime, os

      # The recipe context substitution makes these available as JSON
      votes_raw = [
          '{{zen_vote}}',
          '{{bug_hunter_vote}}',
          '{{integration_vote}}',
          '{{security_vote}}',
          '{{amplifier_vote}}',
      ]

      votes = []
      parse_errors = []
      for raw in votes_raw:
          try:
              v = json.loads(raw) if isinstance(raw, str) else raw
              votes.append(v)
          except Exception as e:
              parse_errors.append(str(e))

      # Tally
      approvals = [v for v in votes if v.get("verdict") == "APPROVE"]
      vetoes = [v for v in votes if v.get("verdict") == "VETO"]
      quorum_size = len(votes)
      quorum_threshold = 4  # 4/5 required

      quorum_passed = len(approvals) >= quorum_threshold and len(vetoes) == 0

      result = {
          "quorum_passed": quorum_passed,
          "approvals": len(approvals),
          "vetoes": len(vetoes),
          "quorum_size": quorum_size,
          "threshold": quorum_threshold,
          "approved_by": [v.get("expert") for v in approvals],
          "vetoed_by": [v.get("expert") for v in vetoes],
          "veto_reasons": [{"expert": v.get("expert"), "reason": v.get("veto_reason")} for v in vetoes],
          "concerns": [{"expert": v.get("expert"), "concern": v.get("primary_concern")} for v in votes],
      }

      if parse_errors:
          result["parse_errors"] = parse_errors

      # Write approval/rejection log
      approval_dir = ".dev-machine/quorum-log"
      os.makedirs(approval_dir, exist_ok=True)
      ts = datetime.datetime.now(datetime.timezone.utc).strftime("%Y%m%dT%H%M%SZ")
      log_file = f"{approval_dir}/{ts}-{'APPROVED' if quorum_passed else 'VETOED'}.json"
      with open(log_file, "w") as f:
          json.dump({
              "timestamp": ts,
              "result": result,
              "votes": votes,
          }, f, indent=2)

      print(f"Quorum log written to: {log_file}")
      print(json.dumps(result))

      if not quorum_passed:
          print("\n=== QUORUM FAILED ===")
          if vetoes:
              print("VETOES:")
              for v in vetoes:
                  print(f"  {v.get('expert')}: {v.get('veto_reason')}")
          else:
              print(f"Insufficient approvals: {len(approvals)}/{quorum_threshold} required")

          # Add blocker to STATE.yaml
          try:
              with open("./STATE.yaml") as f:
                  state = yaml.safe_load(f)
              blockers = state.get("blockers") or []
              veto_summary = "; ".join(
                  f"{v.get('expert')}: {v.get('veto_reason', 'no reason')[:100]}"
                  for v in vetoes
              ) or f"Insufficient approvals ({len(approvals)}/{quorum_threshold})"
              blockers.append({
                  "description": f"Expert quorum FAILED. {veto_summary}",
                  "since": datetime.datetime.now(datetime.timezone.utc).isoformat(),
                  "severity": "high",
                  "quorum_log": log_file,
              })
              state["blockers"] = blockers
              with open("./STATE.yaml", "w") as f:
                  yaml.dump(state, f, default_flow_style=False, sort_keys=False)
          except Exception as e:
              print(f"Warning: could not write blocker to STATE.yaml: {e}")

          exit(1)
      else:
          print(f"\nQUORUM PASSED: {len(approvals)}/{quorum_size} experts approved.")
      PYEOF
    output: "quorum_result"
    parse_json: true
    timeout: 120
    on_error: "fail"

  # ---------------------------------------------------------------------------
  # Step: Post-session -- archive, git commit, health tracking
  # (same as iteration.yaml but with quorum log reference)
  # ---------------------------------------------------------------------------
  - id: "post-session"
    type: "bash"
    command: |
      python3 << 'PYEOF'
      import json, yaml, re, os
      from datetime import datetime, timezone

      try:
          with open("./STATE.yaml") as f:
              state = yaml.safe_load(f)

          session_num = int("{{session_count}}") + 1

          # Archive completed features
          features = state.get("features", {})
          completed_list = state.get("completed_features", [])
          if isinstance(completed_list, list):
              newly_completed = {fid: fd for fid, fd in features.items() if fd.get("status") in ("completed", "done")}
              if newly_completed:
                  archive_path = "FEATURE-ARCHIVE.yaml"
                  try:
                      with open(archive_path) as f:
                          archive = yaml.safe_load(f) or {}
                  except FileNotFoundError:
                      archive = {"description": "Completed feature archive. Append-only.", "features": {}}
                  arch_feats = archive.get("features", {})
                  for fid, fd in newly_completed.items():
                      if fid not in completed_list:
                          completed_list.append(fid)
                      arch_feats[fid] = fd
                      del features[fid]
                  archive["features"] = arch_feats
                  state["completed_features"] = completed_list
                  state["features"] = features
                  with open(archive_path, "w") as f:
                      yaml.dump(archive, f, default_flow_style=False, sort_keys=False, width=120)

          # Archive old session summaries (keep last 5)
          KEEP_SESSIONS = 5
          ctx_path = "./CONTEXT-TRANSFER.md"
          session_archive = "SESSION-ARCHIVE.md"
          if os.path.exists(ctx_path):
              with open(ctx_path) as f:
                  ctx = f.read()
              sess = list(re.finditer(r'^### Session \d+ Summary', ctx, re.MULTILINE))
              if len(sess) > KEEP_SESSIONS:
                  header = ctx[:sess[0].start()]
                  keep_from = sess[-KEEP_SESSIONS]
                  to_archive = ctx[sess[0].start():keep_from.start()]
                  keep = ctx[keep_from.start():]
                  if to_archive.strip():
                      existing = ""
                      if os.path.exists(session_archive):
                          with open(session_archive) as f:
                              existing = f.read()
                      if not existing:
                          existing = "# Session Archive\n\n> Archived session summaries. Append-only.\n\n"
                      if to_archive[:50] not in existing:
                          with open(session_archive, "a") as f:
                              f.write(to_archive)
                  with open(ctx_path, "w") as f:
                      f.write(header)
                      f.write(f"> **Note**: Older sessions archived in SESSION-ARCHIVE.md.\n")
                      f.write(f"> Only the last {KEEP_SESSIONS} sessions kept here.\n\n")
                      f.write(keep)

          state["epoch"] = state.get("epoch", 0) + 1
          state["last_session"] = datetime.now(timezone.utc).isoformat()
          blockers = state.get("blockers", [])

          with open("./STATE.yaml", "w") as f:
              yaml.dump(state, f, default_flow_style=False, sort_keys=False, width=120)

          remaining = sum(1 for f in features.values() if f.get("status") not in ("completed", "done"))
          status = "blocked" if blockers else ("complete" if remaining == 0 else "healthy")

          print(json.dumps({
              "status": status,
              "session_count": str(session_num),
              "next_action": state.get("next_action", ""),
              "total_features": state.get("meta", {}).get("total_features_completed", 0)
          }))
      except Exception as e:
          print(json.dumps({"status": "blocked", "session_count": "{{session_count}}", "error": str(e)}))
      PYEOF

      echo "Checking for uncommitted work..."
      if [ -n "$(git status --porcelain)" ]; then
        echo "Staging and committing changes..."
        git add -A
        SESSION_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        git commit \
          -m "feat: autonomous implementation progress (tightened iteration) - Session ${SESSION_TS}" \
          -m "5-expert quorum approved" \
          -m "Co-Authored-By: Amplifier <240397093+microsoft-amplifier@users.noreply.github.com>" \
          -m "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>" \
          || echo "Commit failed (maybe nothing to commit)"

        if git remote | grep -q origin; then
          echo "Pushing to origin..."
          git push origin main || echo "Push failed - will retry next iteration"
        fi
      else
        echo "No changes to commit"
      fi

      # Empty session cleanup
      SESSIONS_DIR="$HOME/.amplifier/sessions"
      if [ -d "$SESSIONS_DIR" ]; then
        CLEANED=0
        for session_dir in "$SESSIONS_DIR"/*/; do
          [ -d "$session_dir" ] || continue
          events_file="$session_dir/events.jsonl"
          if [ ! -f "$events_file" ] || [ ! -s "$events_file" ]; then
            rm -rf "$session_dir"
            CLEANED=$((CLEANED + 1))
            continue
          fi
          line_count=$(wc -l < "$events_file" 2>/dev/null || echo "0")
          if [ "$line_count" -lt 3 ]; then
            rm -rf "$session_dir"
            CLEANED=$((CLEANED + 1))
          fi
        done
        if [ "$CLEANED" -gt 0 ]; then
          echo "Cleaned up $CLEANED empty/near-empty session directories"
        fi
      fi
    output: "iteration_result"
    parse_json: true
